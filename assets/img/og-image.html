<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Jost:wght@400;500;600&display=swap");
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  .card {
    width: 1200px; height: 630px; position: relative; overflow: hidden;
    background:
      radial-gradient(120% 90% at 82% 6%, rgba(78,157,140,0.30), transparent 55%),
      #112a31;
    color: #f1ebd8; font-family: "Inter", sans-serif;
    padding: 84px 92px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .mark { position: absolute; right: -90px; top: 50%; transform: translateY(-50%); width: 560px; height: 560px; opacity: 0.12; }
  .top { display: flex; align-items: center; gap: 18px; }
  .top svg { width: 64px; height: 64px; }
  .brand { font-family: "Jost", sans-serif; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; font-size: 30px; }
  .brand b { color: #6fc0ae; }
  h1 { font-family: "Jost", sans-serif; font-weight: 500; font-size: 86px; line-height: 1.04; letter-spacing: -0.02em; max-width: 16ch; }
  h1 .accent { color: #6fc0ae; }
  .foot { display: flex; align-items: center; gap: 22px; font-family: "Jost", sans-serif; font-size: 24px; color: rgba(241,235,216,0.78); letter-spacing: 0.02em; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4e9d8c; }
</style>
</head>
<body>
  <div class="card">
    <img class="mark" src="logo-mark.png" alt="" />
    <div class="top">
      <img src="logo-mark.png" style="width:64px;height:64px" alt="" />
      <span class="brand">Vimana<b>.at</b></span>
    </div>
    <h1>Luxury holidays,<br /><span class="accent">open-air concept.</span></h1>
    <div class="foot">
      <span>Hospitality strategy</span><span class="dot"></span>
      <span>Brand &amp; digital</span><span class="dot"></span>
      <span>The house behind Luxury Camp</span>
    </div>
  </div>
</body>
</html>
